<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="favicon.svg">
    <title>404 — Страница не найдена | Project Cataclysm Wiki</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#08090d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Roboto:wght@400;500&family=Roboto+Mono:wght@600&display=swap&subset=cyrillic" rel="stylesheet">
    <link href="shared.css" rel="stylesheet">
    <style>
        .bg-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;overflow:hidden}
        .bg-overlay::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;background:linear-gradient(180deg,rgba(8,9,13,0.75) 0%,rgba(8,9,13,0.88) 40%,rgba(8,9,13,0.95) 100%)}
        .bg-overlay::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:url("images/hero.png") no-repeat center center;background-size:cover;transform:translateZ(0)}

        .error-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:calc(var(--header-h) + 40px) 24px 80px;text-align:center;position:relative}
        .error-content{max-width:680px;width:100%;position:relative;z-index:1}

        .scanlines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;opacity:0.03}
        .scanlines::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.08) 2px,rgba(255,255,255,0.08) 4px)}

        .particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;overflow:hidden}
        .particle{position:absolute;width:2px;height:2px;background:var(--c-accent);border-radius:50%;opacity:0;animation:particleFloat linear infinite}
        .particle:nth-child(1){left:10%;animation-duration:8s;animation-delay:0s}
        .particle:nth-child(2){left:25%;animation-duration:12s;animation-delay:1s}
        .particle:nth-child(3){left:40%;animation-duration:9s;animation-delay:3s}
        .particle:nth-child(4){left:55%;animation-duration:11s;animation-delay:2s}
        .particle:nth-child(5){left:70%;animation-duration:7s;animation-delay:4s}
        .particle:nth-child(6){left:85%;animation-duration:10s;animation-delay:1.5s}
        .particle:nth-child(7){left:15%;animation-duration:13s;animation-delay:5s}
        .particle:nth-child(8){left:60%;animation-duration:8.5s;animation-delay:0.5s}
        @keyframes particleFloat{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:0.6}90%{opacity:0.6}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}

        .error-code{position:relative;font-family:var(--font-display);font-size:clamp(100px,20vw,180px);font-weight:700;letter-spacing:8px;line-height:1;margin-bottom:8px;color:var(--c-text);user-select:none}
        .error-code::before,.error-code::after{content:'404';position:absolute;top:0;left:0;width:100%;height:100%;font-family:inherit;font-size:inherit;font-weight:inherit;letter-spacing:inherit;line-height:inherit}
        .error-code::before{color:var(--c-accent);clip-path:inset(0 0 65% 0);animation:glitchTop 3s steps(1) infinite}
        .error-code::after{color:#ef4444;clip-path:inset(65% 0 0 0);animation:glitchBottom 3s steps(1) infinite}
        @keyframes glitchTop{0%,100%{transform:translate(0)}2%{transform:translate(-3px,-1px)}4%{transform:translate(3px,1px)}6%,94%{transform:translate(0)}96%{transform:translate(2px,-1px)}98%{transform:translate(-2px,1px)}}
        @keyframes glitchBottom{0%,100%{transform:translate(0)}2%{transform:translate(3px,1px)}4%{transform:translate(-3px,-1px)}6%,94%{transform:translate(0)}96%{transform:translate(-3px,1px)}98%{transform:translate(3px,-1px)}}

        .error-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:clamp(200px,40vw,360px);height:clamp(200px,40vw,360px);border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,0.08) 0%,transparent 70%);pointer-events:none;animation:glowPulse 4s ease-in-out infinite}
        @keyframes glowPulse{0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}

        .error-code-wrap{position:relative;display:inline-block;margin-bottom:16px}

        .error-subtitle{font-family:var(--font-display);font-size:clamp(18px,3vw,26px);font-weight:500;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
        .error-subtitle span{background:linear-gradient(135deg,var(--c-accent) 0%,#009db3 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        .error-desc{font-size:15px;color:var(--c-text-2);line-height:1.7;max-width:480px;margin:0 auto 40px}
        .error-divider{width:60px;height:2px;margin:0 auto 40px;background:linear-gradient(90deg,transparent,var(--c-accent),transparent);border-radius:1px}

        .error-nav{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:36px}

        .error-card{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);text-decoration:none;color:var(--c-text);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1),border-color 0.3s cubic-bezier(0.16,1,0.3,1),box-shadow 0.3s cubic-bezier(0.16,1,0.3,1),background 0.3s cubic-bezier(0.16,1,0.3,1)}
        .error-card:hover{background:var(--c-surface-solid);border-color:rgba(var(--c-accent-rgb),0.3);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 20px rgba(var(--c-accent-rgb),0.1)}

        .error-card__icon{width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-md);flex-shrink:0}
        .error-card__icon svg{width:20px;height:20px}
        .error-card__icon--map{background:rgba(59,130,246,0.1);color:#3b82f6}
        .error-card__icon--artifacts{background:rgba(168,85,247,0.1);color:#a855f7}
        .error-card__icon--calculator{background:rgba(245,158,11,0.1);color:#f59e0b}
        .error-card__icon--ttk{background:rgba(239,68,68,0.1);color:#ef4444}

        .error-card__text{text-align:left}
        .error-card__title{font-family:var(--font-display);font-size:15px;font-weight:600;letter-spacing:0.5px;line-height:1.3}
        .error-card__desc{font-size:12px;color:var(--c-text-2);margin-top:2px}

        .error-home{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;background:linear-gradient(135deg,var(--c-accent) 0%,#009db3 100%);color:#08090d;font-family:var(--font-display);font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border-radius:var(--r-md);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1),box-shadow 0.3s cubic-bezier(0.16,1,0.3,1)}
        .error-home:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,229,255,0.25)}
        .error-home:active{transform:translateY(-1px)}
        .error-home svg{width:20px;height:20px}

        .error-signal{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:32px;color:var(--c-text-2);font-family:var(--font-mono);font-size:12px;letter-spacing:1px}
        .error-signal__dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:signalBlink 2s ease-in-out infinite}
        @keyframes signalBlink{0%,100%{opacity:1}50%{opacity:0.2}}

        @media(max-width:640px){.error-nav{grid-template-columns:1fr}.error-code{letter-spacing:4px}.error-subtitle{letter-spacing:1.5px}.error-page{padding:calc(var(--header-h) + 20px) 16px 60px}}
        @media(max-width:480px){.error-card{padding:14px}.error-card__icon{width:36px;height:36px}.error-card__icon svg{width:18px;height:18px}.error-home{padding:12px 28px;font-size:14px}}
        @media(hover:none){.error-card:hover{transform:none;box-shadow:none}.error-card:active{background:var(--c-surface-solid);border-color:rgba(var(--c-accent-rgb),0.3)}.error-home:hover{transform:none;box-shadow:none}.error-home:active{transform:scale(0.97)}}
        @media(prefers-reduced-motion:reduce){.error-code::before,.error-code::after{animation:none}.error-glow{animation:none}.error-signal__dot{animation:none}.particle{animation:none;display:none}}
        @media print{.particles,.scanlines,.error-glow,.bg-overlay{display:none}.error-code{color:#000}.error-code::before,.error-code::after{display:none}}
    </style>
</head>
